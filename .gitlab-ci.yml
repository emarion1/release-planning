stages:
  - fetch
  - plan
  - publish

# ─── Shared configuration ────────────────────────────────────────────────────

variables:
  JIRA_SERVER: "https://redhat.atlassian.net"
  JIRA_PLAN_ID: "625"
  JIRA_SCENARIO_ID: "623"
  TARGET_PRODUCT: "RHOAI"
  FEATURE_TRAFFIC_DATA_REPO: "redhat/rhel-ai/agentic-ci/feature-traffic-data"
  RELEASE_PLANNING_DATA_REPO: "redhat/rhel-ai/agentic-ci/release-planning-data"
  CLAUDE_MODEL: "claude-opus-4-6"
  CLAUDE_CODE_USE_VERTEX: "1"
  ANTHROPIC_VERTEX_PROJECT_ID: "$GCP_PROJECT_ID"
  CLOUD_ML_REGION: "global"
  DISABLE_AUTOUPDATER: "1"
  CLAUDE_CODE_SUBAGENT_MODEL: "claude-opus-4-6"
  GOOGLE_APPLICATION_CREDENTIALS: "/tmp/gcp-key.json"
  FF_TIMESTAMPS: "true"

.common:
  tags:
    - aipcc-small-x86_64
  image: registry.access.redhat.com/ubi9/ubi-minimal:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"
    - if: $CI_PIPELINE_SOURCE == "push"
      when: manual

# ─── Stage 1: Fetch all data ─────────────────────────────────────────────────

fetch-data:
  extends: .common
  stage: fetch
  before_script:
    - microdnf install -y --nodocs python3 python3-pip git-core
    - pip3 install requests
  script:
    # Pull latest feature-traffic data (daily-refreshed RHAISTRAT features)
    - git clone --depth 1
        "https://oauth2:${GITLAB_PUSH_TOKEN}@gitlab.com/${FEATURE_TRAFFIC_DATA_REPO}.git"
        data/feature-traffic

    # Fetch Advanced Roadmaps plan ranking (non-standard Jira endpoint)
    - |
      JIRA_EMAIL="${JIRA_EMAIL}" \
      JIRA_API_TOKEN="${JIRA_API_TOKEN}" \
      JIRA_PLAN_ID="${JIRA_PLAN_ID}" \
      JIRA_SCENARIO_ID="${JIRA_SCENARIO_ID}" \
      python3 scripts/fetch-plan-ranking.py

    # TODO: remove fetch-supplemental.py once feature-traffic adds these fields.
    # See feature-traffic-changes.md for the required changes.
    - |
      JIRA_EMAIL="${JIRA_EMAIL}" \
      JIRA_API_TOKEN="${JIRA_API_TOKEN}" \
      python3 scripts/fetch-supplemental.py

    # Merge all data sources and apply feature sizing
    - TARGET_PRODUCT="${TARGET_PRODUCT}" python3 scripts/prepare-features.py

    # Run deterministic auto-scheduler
    - python3 scripts/auto_scheduler.py
        --input data/features-ready.json
        --output data/schedule.json
  artifacts:
    paths:
      - data/features-ready.json
      - data/schedule.json
    expire_in: 1 day

# ─── Stage 2: Generate release plan with Claude ───────────────────────────────

generate-plan:
  extends: .common
  stage: plan
  needs: [fetch-data]
  timeout: 30m
  before_script:
    - bash ci-scripts/setup-claude-ci.sh
    - chmod -R a+rwX "$CI_PROJECT_DIR"
  script:
    - mkdir -p output
    - bash ci-scripts/run-claude.sh "/release-plan"
  artifacts:
    when: always
    paths:
      - output/
      - claude-otel.jsonl
      - claude-stderr.log
    expire_in: 30 days

# ─── Stage 3: Publish to release-planning-data ───────────────────────────────

publish-results:
  extends: .common
  stage: publish
  needs: [generate-plan]
  before_script:
    - microdnf install -y --nodocs git-core python3
  script:
    - python3 ci-scripts/push-results.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"
